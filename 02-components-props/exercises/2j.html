<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
  </head>
  <body>
    <div class="container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script type="text/babel">
      <div class="container"></div>;

      function ProductDetails({ name, price, discountPrice ,image}) {
        return (
          <div>
          <img src={image} width="50"/>
            <p>{name}</p>

            {!discountPrice ? (
              <p>Price: ${price}</p>
            ) : (
              <p>
                <del>Price: ${price}</del>
              </p>
            )}

            {discountPrice && <p>Discount price: ${discountPrice}</p>}
            <button>Add to Cart</button>
            
          </div>
        );
      }

      function App() {
        return (
          <>
            <ProductDetails
              name="Cotton socks"
              price="10.90"
              discountPrice="5.45"
              image="cotton-socks.png"
            />
            <ProductDetails name="Tennis balls" price="6.99"
            image="tennis-balls.png"/>

            <ProductDetails
             name="Plain T-shirt" price="7.99" image="plain-t-shirt.png" />
          </>
        );
      }

      const container = document.querySelector(".container");
      const rend = ReactDOM.createRoot(container);
      rend.render(<App />);
      // rend.render(<LoginForm />)
    </script>
  </body>
</html>
